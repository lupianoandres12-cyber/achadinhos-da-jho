<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Links</title>
<link rel="icon" href="logo.svg" type="image/svg+xml">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Jost:wght@400;500;600&display=swap">
<style>
  :root {
    --rose: #d4a5a5;
    --clay: #b87d6d;
    --sand: #e8d5c4;
    --burgundy: #5d2e46;
    --burgundy-deep: #452134;
    --cream: #faf6f2;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Jost', 'Segoe UI', system-ui, -apple-system, Roboto, sans-serif;
    background:
      radial-gradient(480px 380px at 50% -8%, rgba(212,165,165,0.35), transparent 70%),
      linear-gradient(180deg, var(--burgundy) 0%, var(--burgundy-deep) 100%);
    display: flex;
    justify-content: center;
    padding: 56px 20px 40px;
    position: relative;
    overflow-x: hidden;
  }
  /* watermark botanico decorativo */
  body::before {
    content: "";
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 420px; height: 420px;
    background: radial-gradient(circle, rgba(232,213,196,0.10) 0%, transparent 65%);
    pointer-events: none;
  }
  .wrap { max-width: 400px; width: 100%; text-align: center; position: relative; z-index: 1; }

  .avatar-ring {
    width: 92px; height: 92px;
    margin: 0 auto 18px;
    border-radius: 50%;
    background: linear-gradient(145deg, var(--rose), var(--clay));
    padding: 3px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  }
  .avatar-ring-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: var(--burgundy-deep);
    display: flex; align-items: center; justify-content: center;
  }
  .avatar-ring-inner img { width: 56%; height: 56%; object-fit: contain; }

  h1 {
    color: var(--sand);
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.55rem;
    font-weight: 600;
    margin: 0 0 8px;
    letter-spacing: 0.01em;
  }
  p.sub {
    color: var(--rose);
    font-size: 0.76rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin: 0 0 34px;
    font-weight: 500;
  }
  p.sub::before, p.sub::after {
    content: "✦";
    color: var(--clay);
    margin: 0 10px;
    font-size: 0.65rem;
    vertical-align: middle;
  }

  a.link-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(232, 213, 196, 0.08);
    backdrop-filter: blur(2px);
    color: var(--cream);
    text-decoration: none;
    padding: 16px 20px;
    border: 1px solid rgba(232, 213, 196, 0.28);
    border-radius: 999px;
    font-size: 0.87rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    margin-bottom: 14px;
    text-align: left;
    transition: transform .18s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease;
  }
  a.link-btn:hover {
    background: rgba(232, 213, 196, 0.16);
    border-color: var(--rose);
    transform: translateY(-2px);
    box-shadow: 0 10px 22px rgba(0,0,0,0.22);
  }
  a.link-btn .icon {
    width: 34px; height: 34px;
    min-width: 34px;
    border-radius: 50%;
    background: linear-gradient(145deg, var(--rose), var(--clay));
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }
  a.link-btn.primary {
    background: linear-gradient(135deg, var(--rose), var(--clay));
    border-color: transparent;
    color: var(--burgundy-deep);
    font-weight: 600;
  }
  a.link-btn.primary .icon { background: rgba(255,255,255,0.35); }
  a.link-btn.primary:hover { box-shadow: 0 10px 26px rgba(184,125,109,0.45); }

  .divider {
    display: flex; align-items: center; gap: 10px;
    color: rgba(232,213,196,0.4);
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin: 22px 0 14px;
  }
  .divider::before, .divider::after {
    content: ""; flex: 1; height: 1px;
    background: rgba(232,213,196,0.22);
  }

  footer {
    color: rgba(232, 213, 196, 0.45);
    font-size: 0.68rem;
    margin-top: 30px;
    line-height: 1.7;
  }
  footer .heart { color: var(--rose); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="avatar-ring">
      <div class="avatar-ring-inner">
        <img src="logo.svg" alt="Logo">
      </div>
    </div>
    <h1 id="site-name">Achadinhos da Jhô</h1>
    <p class="sub">beleza &amp; achados</p>

    <a class="link-btn primary" id="link-site" href="index.html">
      <span class="icon">🛍️</span> Ver catálogo completo com preços
    </a>
    <a class="link-btn" id="link-whatsapp" href="#" target="_blank">
      <span class="icon">💌</span> Grupo VIP no WhatsApp — promo em primeira mão
    </a>

    <div class="divider">me segue por aqui também</div>

    <a class="link-btn" id="link-instagram" href="#" target="_blank">
      <span class="icon">📸</span> Instagram
    </a>
    <a class="link-btn" id="link-tiktok" href="#" target="_blank" style="display:none">
      <span class="icon">🎀</span> TikTok
    </a>

    <footer>Este perfil usa links de afiliado. Comprando por eles, você não paga nada a mais e ajuda o canal <span class="heart">♥</span></footer>
  </div>

<script src="config.js"></script>
<script>
  document.getElementById("site-name").textContent = SITE_CONFIG.siteName;
  document.getElementById("link-whatsapp").href = SITE_CONFIG.whatsappGroupUrl;
  document.getElementById("link-instagram").href = SITE_CONFIG.instagramUrl;

  var tiktokBtn = document.getElementById("link-tiktok");
  if (SITE_CONFIG.tiktokUrl && SITE_CONFIG.tiktokUrl.indexOf("COLOQUE-SEU-USUARIO-AQUI") === -1) {
    tiktokBtn.href = SITE_CONFIG.tiktokUrl;
    tiktokBtn.style.display = "flex";
  }
</script>
</body>
</html>
